<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: none;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #envelope {
            position: absolute;
            font-size: 120px;
            color: #ff4444;
            cursor: pointer;
            transition: transform 0.1s ease;
            z-index: 10;
            user-select: none;
        }
        #cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            transition: all 0.05s ease;
        }
        #cursor::after {
            content: '';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 0 0 0 100%;
            transform: rotate(45deg);
        }
        #heart {
            position: absolute;
            width: 400px;
            height: 400px;
            opacity: 0;
            z-index: 5;
        }
        #text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff69b4;
            opacity: 0;
            z-index: 15;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 2px;
        }
        @keyframes explode {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            100% { opacity: 0; transform: scale(3) rotate(720deg); }
        }
        .line {
            position: absolute;
            background: linear-gradient(45deg, #ff69b4, #ffd700);
            opacity: 0;
            box-shadow: 0 0 20px #ff69b4;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="envelope">✉️</div>
        <div id="cursor"></div>
        <svg id="heart" viewBox="0 0 400 400">
            <!-- Heart path will be drawn dynamically -->
        </svg>
        <div id="text">EID MUBARIK</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const cursor = document.getElementById('cursor');
        const heart = document.getElementById('heart');
        const text = document.getElementById('text');

        let attempts = 0;
        const maxAttempts = 5;
        let gameActive = true;
        let envelopeX = 0;
        let envelopeY = 0;

        // Custom cursor tracking
        document.addEventListener('mousemove', (e) => {
            if (gameActive) {
                cursor.style.left = (e.clientX - 10) + 'px';
                cursor.style.top = (e.clientY - 10) + 'px';
            }
        });

        // Update envelope position (centered initially)
        function updateEnvelopePos() {
            const rect = document.getElementById('container').getBoundingClientRect();
            envelopeX = rect.width / 2;
            envelopeY = rect.height / 2;
            envelope.style.left = envelopeX + 'px';
            envelope.style.top = envelopeY + 'px';
            envelope.style.transform = 'translate(-50%, -50%)';
        }
        updateEnvelopePos();
        window.addEventListener('resize', updateEnvelopePos);

        // Check collision
        function checkCollision() {
            const cursorRect = cursor.getBoundingClientRect();
            const envRect = envelope.getBoundingClientRect();
            
            return cursorRect.left < envRect.right &&
                   cursorRect.right > envRect.left &&
                   cursorRect.top < envRect.bottom &&
                   cursorRect.bottom > envRect.top;
        }

        // Teleport envelope
        function teleportEnvelope() {
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 200;
            envelopeX += Math.cos(angle) * distance;
            envelopeY += Math.sin(angle) * distance;
            
            // Keep within bounds
            envelopeX = Math.max(100, Math.min(window.innerWidth - 100, envelopeX));
            envelopeY = Math.max(100, Math.min(window.innerHeight - 100, envelopeY));
            
            envelope.style.left = envelopeX + 'px';
            envelope.style.top = envelopeY + 'px';
            envelope.style.transform = 'translate(-50%, -50%) scale(1.2)';
            
            setTimeout(() => {
                envelope.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 100);
        }

        // Main game loop
        function gameLoop() {
            if (!gameActive) return;

            if (checkCollision() && attempts < maxAttempts) {
                attempts++;
                teleportEnvelope();
                // Visual feedback
                cursor.style.background = '#ff4444';
                setTimeout(() => cursor.style.background = '#fff', 100);
            }

            requestAnimationFrame(gameLoop);
        }

        // Click handler
        envelope.addEventListener('click', (e) => {
            e.stopPropagation();
            if (attempts >= maxAttempts - 1 && checkCollision()) {
                // Success on 5th attempt
                gameActive = false;
                explodeEnvelope();
            }
        });

        // Explode envelope into lines
        function explodeEnvelope() {
            envelope.style.opacity = '0';
            cursor.style.opacity = '0';

            // Create many lines radiating outward
            const numLines = 1000;
            const lines = [];
            
            for (let i = 0; i < numLines; i++) {
                const line = document.createElement('div');
                line.className = 'line';
                line.style.width = (1 + Math.random() * 3) + 'px';
                line.style.height = (20 + Math.random() * 80) + 'px';
                line.style.left = envelopeX + 'px';
                line.style.top = envelopeY + 'px';
                line.style.transformOrigin = 'center center';
                
                const angle = (i / numLines) * Math.PI * 2;
                const length = 50 + Math.random() * 100;
                line.style.transform = `rotate(${angle}rad) translate(0, -${length/2}px)`;
                
                document.body.appendChild(line);
                lines.push(line);
                
                // Animate each line
                setTimeout(() => {
                    line.style.opacity = '1';
                    line.style.animation = 'explode 1s ease-out forwards';
                }, i * 10);
            }

            // Draw heart after explosion (at ~3s)
            setTimeout(() => {
                drawHeart();
                // Clean up lines
                lines.forEach(line => {
                    setTimeout(() => line.remove(), 1000);
                });
            }, 3000);

            // Show text at ~5s, hold till 60s
            setTimeout(() => {
                text.style.opacity = '1';
                text.style.animation = 'glow 2s ease-in-out infinite alternate';
            }, 5000);
        }

        // Draw complex heart using SVG paths
        function drawHeart() {
            heart.innerHTML = `
                <path d="M 200,80 Q 160,20 120,80 Q 80,120 100,180 Q 120,240 200,260 Q 280,240 300,180 Q 320,120 280,80 Q 240,20 200,80 Z
                           M 180,100 Q 170,60 150,90 Q 140,120 160,160 Q 170,190 190,200 Q 210,190 220,160 Q 240,120 230,90 Q 210,60 180,100 Z
                           M 210,100 Q 220,60 240,90 Q 250,120 230,160 Q 220,190 200,200 Q 180,190 170,160 Q 150,120 160,90 Q 180,60 210,100 Z
                           M 190,120 Q 185,100 175,115 Q 170,130 180,150 Q 185,165 195,170 Q 205,165 210,150 Q 220,130 215,115 Q 205,100 190,120 Z" 
                             fill="none" 
                             stroke="url(#heartGradient)" 
                             stroke-width="8" 
                             stroke-linecap="round"
                             opacity="0">
                </path>
            `;
            
            // Add gradient
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            gradient.setAttribute('id', 'heartGradient');
            gradient.setAttribute('x1', '0%');
            gradient.setAttribute('y1', '0%');
            gradient.setAttribute('x2', '100%');
            gradient.setAttribute('y2', '100%');
            gradient.innerHTML = `
                <stop offset="0%" stop-color="#ff69b4">
                    <animate attributeName="stop-color" values="#ff69b4;#ffd700;#ff1493;#ffd700;#ff69b4" dur="3s" repeatCount="indefinite"/>
                </stop>
                <stop offset="100%" stop-color="#ffd700">
                    <animate attributeName="stop-color" values="#ffd700;#ff69b4;#ffd700;#ff1493;#ffd700" dur="3s" repeatCount="indefinite"/>
                </stop>
            `;
            defs.appendChild(gradient);
            heart.insertBefore(defs, heart.firstChild);

            // Animate heart drawing and glow
            const path = heart.querySelector('path');
            heart.style.opacity = '1';
            
            // Dasharray stroke animation for drawing effect
            const heartLength = 800; // Approximate path length
            path.style.strokeDasharray = heartLength;
            path.style.strokeDashoffset = heartLength;
            
            path.style.animation = `
                dashdraw 2s ease-out forwards,
                glowHeart 2s ease-in-out 2s infinite alternate
            `;
            
            // Add glow filter
            const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
            filter.setAttribute('id', 'glow');
            filter.innerHTML = `
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge> 
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            `;
            defs.appendChild(filter);
            path.setAttribute('filter', 'url(#glow)');
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes dashdraw {
                to { stroke-dashoffset: 0; }
            }
            @keyframes glowHeart {
                0% { filter: url(#glow); stroke-width: 8; }
                100% { filter: url(#glow); stroke-width: 12; }
            }
            @keyframes glow {
                0%, 100% { text-shadow: 0 0 20px #ffd700, 0 0 40px #ff69b4, 0 0 60px #ff1493; }
                50% { text-shadow: 0 0 30px #ffd700, 0 0 50px #ff69b4, 0 0 80px #ff1493; }
            }
        `;
        document.head.appendChild(style);

        // Start game
        gameLoop();

        // Hold final scene for 60s total
        setTimeout(() => {
            document.body.style.background = 'radial-gradient(circle, #000 0%, #111 50%, #000 100%)';
        }, 55000);
    </script>
</body>
</html>
